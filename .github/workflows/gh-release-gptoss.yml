name: Android Release (gptoss)

on:
  push:
    branches: [ "gptoss" ]

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release APK (gptoss)
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating a GitHub Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.7

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf-reader-release-apk-gptoss
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Release Build (gptoss) #${{ github.run_number }}"
          tag_name: "gptoss-release-${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
